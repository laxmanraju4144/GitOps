apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# -------------------------------------------------------
# Overlay for AWS EKS
# Uncomment sections below when deploying to EKS
# -------------------------------------------------------

resources:
  - ../../base

# namespace: itkannadigaru          # Uncomment: target namespace on EKS

# Common labels applied to all resources
labels:
  - pairs:
      environment: eks

# Image overrides — update tag here when a new image is pushed
images:
  - name: laxmanraju/adservice
    newTag: "1"
  - name: laxmanraju/cartservice
    newTag: "1"
  - name: laxmanraju/checkoutservice
    newTag: "1"
  - name: laxmanraju/currencyservice
    newTag: "1"
  - name: laxmanraju/emailservice
    newTag: "1"
  - name: laxmanraju/frontend
    newTag: "1"
  - name: laxmanraju/loadgenerator
    newTag: "1"
  - name: laxmanraju/paymentservice
    newTag: "1"
  - name: laxmanraju/productcatalogservice
    newTag: "1"
  - name: laxmanraju/recommendationservice
    newTag: "1"
  - name: laxmanraju/shippingservice
    newTag: "1"
  - name: laxmanraju/shoppingassistantservice
    newTag: "1"

# -------------------------------------------------------
# EKS-specific patches — Uncomment when deploying to EKS
# -------------------------------------------------------

